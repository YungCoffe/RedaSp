<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Yung Redação</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        button { background: #8b5cf6; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card" id="loginCard">
        <h2>Login - Yung</h2>
        <input type="text" id="user" placeholder="RA">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div class="card" id="painel" style="display:none;">
        <h2>✍️ Yung Redação</h2>
        <select id="listaRedacoes"><option>Carregando...</option></select>
        <textarea id="texto" placeholder="Cole sua redação aqui..."></textarea>
        <button onclick="enviarRascunho()">Enviar Rascunho</button>
    </div>

    <script>
        async function fazerLogin() {
            const user = document.getElementById('user').value;
            const senha = document.getElementById('senha').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, senha })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('yung_token', data.token);
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                carregarRedacoes();
            } else { alert("Login falhou"); }
        }

        async function carregarRedacoes() {
            const token = localStorage.getItem('yung_token');
            const res = await fetch('/api/redacoes', { headers: { 'Authorization': token } });
            const data = await res.json();
            const select = document.getElementById('listaRedacoes');
            select.innerHTML = "";
            data.forEach(item => {
                const meta = JSON.stringify({ taskId: item.task_id, answerId: item.id, executedOn: item.executed_on });
                select.innerHTML += `<option value='${meta}'>${item.task.title}</option>`;
            });
        }

        async function enviarRascunho() {
            const dados = JSON.parse(document.getElementById('listaRedacoes').value);
            const texto = document.getElementById('texto').value;
            const token = localStorage.getItem('yung_token');
            const res = await fetch('/api/salvar', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ ...dados, texto })
            });
            alert(res.ok ? "Salvo com sucesso!" : "Erro ao enviar.");
        }
    </script>
</body>
</html>
