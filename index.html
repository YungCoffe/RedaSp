<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 300px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #e94560; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="user" placeholder="Usuário (Ex: 1168136416sp)">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <script>
        const API_URL = '';
        async function login() {
            const user = document.getElementById('user').value;
            const senha = document.getElementById('senha').value;
            
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, senha })
            });
            const data = await res.json();
            if (data.token || data.accessToken) {
                localStorage.setItem('elefante_token', data.token || data.accessToken);
                alert('Logado!');
            } else {
                alert('Erro: ' + JSON.stringify(data));
            }
        }
    </script>
</body>
</html>
