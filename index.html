<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elefante Letrado</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 16px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #38bdf8; }
        .input-group { position: relative; margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .toggle-password { position: absolute; right: 10px; top: 12px; cursor: pointer; color: #94a3b8; font-size: 12px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🐘 Login</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="Ex: 1234567890sp">
        </div>
        <div class="input-group">
            <input type="password" id="senha" placeholder="Senha">
            <span class="toggle-password" onclick="toggleSenha()">👁️</span>
        </div>
        <button onclick="login()">Entrar</button>
    </div>

    <script>
        function toggleSenha() {
            const s = document.getElementById('senha');
            s.type = (s.type === 'password') ? 'text' : 'password';
        }

        async function login() {
            const user = document.getElementById('user').value;
            const senha = document.getElementById('senha').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, senha })
            });
            
            const data = await res.json();
            if (data.token || data.accessToken) {
                localStorage.setItem('elefante_token', data.token || data.accessToken);
                alert('Logado com sucesso!');
            } else {
                alert('Erro: ' + (data.error || 'Dados inválidos'));
            }
        }
    </script>
</body>
</html>
