<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elefante Letrado 🐘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { text-align: center; margin-bottom: 10px; font-size: 28px; }
        h1 span { color: #e94560; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #ddd; }
        input {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; outline: none;
        }
        input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 0 2px #e94560; }
        .row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
        button {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: #e94560; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .status { text-align: center; padding: 12px; border-radius: 10px; margin-top: 15px; font-size: 14px; display: none; }
        .status.success { background: rgba(0,255,0,0.1); color: #00ff88; display: block; }
        .status.error { background: rgba(255,0,0,0.1); color: #ff4444; display: block; }
        .status.loading { background: rgba(255,165,0,0.1); color: #ffa500; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐘 <span>Elefante</span> Letrado</h1>
        <p class="subtitle">Automatize sua leitura</p>

        <div id="loginForm">
            <div class="row">
                <div class="form-group">
                    <label>RA</label>
                    <input type="text" id="ra" placeholder="000000000" maxlength="9">
                </div>
                <div class="form-group">
                    <label>Dígito</label>
                    <input type="text" id="digito" placeholder="0" maxlength="1">
                </div>
                <div class="form-group">
                    <label>UF</label>
                    <input type="text" id="uf" value="SP" readonly>
                </div>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Sua senha">
            </div>
            <button onclick="login()" id="btnLogin">Entrar</button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <script>
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        async function login() {
            showStatus('Autenticando...', 'loading');
            
            // Formatando o RA completo conforme a API espera
            const raCompleto = document.getElementById('ra').value + document.getElementById('digito').value;
            
            try {
                // Rota corrigida para apontar para o seu backend na Vercel[span_1](start_span)[span_1](end_span)
                const res = await fetch('/api/backend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: raCompleto,
                        senha: document.getElementById('senha').value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showStatus('Login realizado com sucesso!', 'success');
                } else {
                    showStatus('Erro: ' + (data.error || 'Falha no login'), 'error');
                }
            } catch (err) {
                showStatus('Erro de conexão: ' + err.message, 'error');
            }
        }
    </script>
</body>
</html>
